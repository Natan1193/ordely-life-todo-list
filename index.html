<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orderly Life To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <header>
        <h1>Orderly Life To-Do List</h1>
    </header>

    <main>
        <form id="toDoForm">

            <label for="taskInput" id="newTaskLabel">Nova tarefa</label>
            <input type="text" name="task" id="taskInput" placeholder="Nova tarefa..." required>
            <button type="submit" name="add" id="addButton">Adicionar</button>

        </form>

        <section class="tasks">
            <h2>Tarefas</h2>
            <ul id="toDoList">
                
            </ul>
        </section>
    </main>

    <script src="./js/script.js"></script>

    <footer>
        <p>&reg; Orderly Life To-Do List</p>
    </footer>

</body>

</html>
